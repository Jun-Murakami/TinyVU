<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyVU — Web Demo</title>
    <meta name="description" content="A minimalist VU meter. Browser demo of the same calibration that runs inside the JUCE plugin." />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #2b2b2b;
        font-family: 'Jost', system-ui, -apple-system, sans-serif;
        color: #ddd;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2b2b2b;
        z-index: 9999;
        transition: opacity 150ms ease;
      }
      #splash.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
